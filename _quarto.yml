highlight-style: a11y

format:
  html:
    toc: true
    theme: 
      light: [simplex, css/custom.scss]
      dark: [simplex, css/dark.scss, css/custom.scss]
    code-overflow: wrap
    include-after-body: mountains.html
    code-tools: 
      source: true
      toggle: false
      caption: none
    code-link: true
execute: 
  echo: false

  